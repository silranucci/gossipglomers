services:
  maelstrom:
    build: .
    image: gossipglomers-maelstrom:latest
    volumes:
      - .:/app
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      # Separate volume for build artifacts: keeps the Linux binaries isolated
      # from the macOS host's target/ directory and persists them across restarts.
      - target:/app/target

volumes:
  cargo-registry:
  cargo-git:
  target:
